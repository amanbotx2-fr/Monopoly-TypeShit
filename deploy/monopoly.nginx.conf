server {
    listen 80;
    # TODO: set Aman Kumar's production frontend domain.
    server_name TODO_FRONTEND_DOMAIN;

    # TODO: set Aman Kumar's deployment user/path.
    root /home/TODO_DEPLOY_USER/monopoly-client;
    index index.html;

    # API + websocket go to node. Having them share the SPA's domain means no
    # CORS, no cross-domain cookies, and the client can use relative URLs for
    # everything.
    location /api/ {
        proxy_pass http://127.0.0.1:5004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /sfx/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri /index.html;
    }
}
